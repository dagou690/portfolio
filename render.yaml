services:
  - type: web
    name: portfolio-alex
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn portfolio_django.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

databases:
  - name: portfolio-db
    plan: free
```

